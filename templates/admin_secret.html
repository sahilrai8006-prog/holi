<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raishab Holi | Secret Admin Intelligence</title>
    <style>
        :root {
            --primary: #FF1493;
            --bg: #080808;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .logo span {
            color: var(--primary);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-info {
            padding: 1rem;
            font-size: 0.8rem;
            color: #888;
        }

        .empty {
            text-align: center;
            padding: 5rem;
            color: #555;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">RAISHAB <span>SECRET PANEL</span></div>
        <div class="stats">Total Creations: {{ images|length }}</div>
    </div>

    {% if images %}
    <div class="gallery">
        {% for img in images %}
        <div class="card">
            <a href="/static/outputs/{{ img }}" target="_blank">
                <img src="/static/outputs/{{ img }}" alt="Generated Output">
            </a>
            <div class="card-info">
                Filename: {{ img }}
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="empty">
        🕵️ No creations detected yet. Waiting for the magic to happen...
    </div>
    {% endif %}
</body>

</html>
